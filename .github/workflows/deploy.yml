name: deploy
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - name: fix frontend permissions
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22
          script: sudo rm -rf /home/ubuntu/apps/inv-platform/frontend/ && mkdir -p /home/ubuntu/apps/inv-platform/frontend/
      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22
          source: frontend/dist/
          target: /home/ubuntu/apps/inv-platform/frontend/
          strip_components: 1
      - name: restart backend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22
          command_timeout: 2m
          script_stop: true
          script: |
            cd /home/ubuntu/apps/inv-platform
            git pull
            .venv/bin/pip install -q -r backend/requirements.txt
            sudo systemctl daemon-reload
            sudo systemctl restart inv-platform
            sleep 8
            curl -sf http://127.0.0.1:8000/api/templates > /dev/null || { echo "health check failed, checking journal..."; sudo journalctl -u inv-platform --no-pager -n 20; exit 1; }
