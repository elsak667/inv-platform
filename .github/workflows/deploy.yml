name: deploy
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22
          source: frontend/dist/
          target: /home/ubuntu/apps/inv-platform/frontend/
          strip_components: 1
          overwrite: true
      - name: restart backend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22
          script_stop: true
          script: |
            cd /home/ubuntu/apps/inv-platform
            git pull
            pip install -r requirements.txt 2>&1 || echo "pip install skipped"
            sudo systemctl restart inv-platform
            sleep 3
            echo "=== service status ==="
            sudo systemctl status inv-platform --no-pager -n 20
            echo "=== journal ==="
            sudo journalctl -u inv-platform --no-pager -n 50
            echo "=== health check ==="
            curl -s -o /dev/null -w "HTTP %{http_code}" http://127.0.0.1:8000/api/templates || echo "curl failed"
